<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; width:1920px; height:1080px; overflow:hidden; background:transparent; font-family:'Space Grotesk',sans-serif; }
  @keyframes crawl { from{transform:translateX(0);} to{transform:translateX(-50%);} }
</style>
</head>
<body>
<div style="position:absolute;top:56px;left:80px;display:flex;align-items:center;gap:16px;">
  <div style="display:flex;flex-direction:column;gap:5px;width:40px;">
    <div style="height:10px;border-radius:3px;background:#F6A623;width:100%;box-shadow:0 0 12px rgba(246,166,35,.6);"></div>
    <div style="height:10px;border-radius:3px;background:#fff;width:66%;"></div>
    <div style="height:10px;border-radius:3px;background:rgba(255,255,255,.3);width:40%;"></div>
  </div>
  <span style="font-weight:700;font-size:28px;color:#fff;letter-spacing:-.01em;text-shadow:0 2px 12px rgba(0,0,0,.6);">NoaCG</span>
</div>
<div id="c" style="position:absolute;bottom:60px;right:90px;font-family:'JetBrains Mono',monospace;font-size:34px;color:#fff;letter-spacing:.06em;text-shadow:0 2px 12px rgba(0,0,0,.6);">20:14<span style="color:#F6A623;">:38</span></div>
<script>
function tick(){var d=new Date();var p=function(n){return String(n).padStart(2,'0');};document.getElementById('c').innerHTML=p(d.getHours())+':'+p(d.getMinutes())+'<span style="color:#F6A623">:'+p(d.getSeconds())+'</span>';}
setInterval(tick,1000);tick();
</script>
</body>
</html>
