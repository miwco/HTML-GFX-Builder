<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; width:1920px; height:1080px; overflow:hidden; background:transparent; font-family:'Space Grotesk',sans-serif; }
  @keyframes crawl { from{transform:translateX(0);} to{transform:translateX(-50%);} }
</style>

<body>
<div style="position:absolute;top:60px;right:80px;font-family:'JetBrains Mono',monospace;font-size:20px;color:#fff;background:#E5484D;padding:8px 16px;border-radius:6px;letter-spacing:.14em;">&#9679; LIVE</div>
<div style="position:absolute;left:120px;bottom:130px;box-shadow:0 16px 50px rgba(0,0,0,.5);">
  <div style="background:#F6A623;padding:9px 26px;display:inline-block;box-shadow:0 0 26px rgba(246,166,35,.45);"><span style="font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:.24em;color:#0A0C10;text-transform:uppercase;font-weight:700;">Breaking</span></div>
  <div style="background:rgba(10,12,16,.86);backdrop-filter:blur(8px);padding:26px 60px 30px 32px;border-left:8px solid #F6A623;max-width:1000px;">
    <div style="font-weight:700;font-size:46px;color:#fff;line-height:1.12;">Coalition talks reach midnight deadline</div>
  </div>
</div>
</body>
</html>
