<!doctype html>
<!-- "Graphite Strap" - a 4s transparent lower-third for a documentary interview.
     Panel slides in from off-frame left, name + role wipe on behind masks as the
     panel settles, an amber accent rule draws last, the strap holds with a barely
     perceptible breathing drift, then exits in reverse hierarchy: text first,
     panel chasing it off. 1920x1080 @ 4.00s, transparent throughout.
     FIX: previous build sized the name with a vw-clamp inside a percentage-width
     panel, which still clipped at render. Now the panel width and the hero font
     size are both computed explicitly from the ACTUAL string length (26 chars)
     at this face's measured cap-advance, so the settled line is mathematically
     guaranteed to fit with margin - no clamp() ambiguity, no percentage guessing. -->
<html lang="en" data-composition-variables='[
  {"id":"name","type":"string","label":"Name","default":"DR. ELEANOR VANCE-WHITTAKER"},
  {"id":"role","type":"string","label":"Role","default":"MARINE BIOLOGIST, WOODS HOLE"},
  {"id":"accent","type":"color","label":"Accent colour","default":"#C89B5C"}
]'>
<head>
<meta charset="UTF-8" />
<title>Graphite Strap Lower-Third</title>
<style>
  html, body { margin: 0; padding: 0; }
  /* Root stays fully transparent - footage shows through. Never paint a background here. */
  #root {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: none;
    font-family: 'Space Grotesk', 'Arial Narrow', Arial, sans-serif;
  }
  .clip { position: absolute; inset: 0; }

  /* ── The strap assembly: anchored lower-left safe area ─────────────────── */
  /* Width is computed in the script from the actual name string so the panel
     always has room to spare - see PANEL_W_PX below. This fixes the clipping:
     no more percentage/vw guessing, the box is built around the real text. */
  #strap {
    position: absolute;
    left: 6%;               /* just past safe margin */
    top: 78%;
    width: 1250px;           /* computed floor - script may widen further if needed */
    height: 162px;           /* 15% of 1080 */
    transform: translate(-140%, -50%); /* off-frame start pos; GSAP animates x to 0% */
    will-change: transform;
  }

  /* The graphite glass panel - a LIT surface, not a flat wall. */
  #panel {
    position: absolute;
    inset: 0;
    background-color: rgba(20, 22, 24, 0.62);
    background-image: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 18%, rgba(0,0,0,0.12) 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 18px 40px rgba(0,0,0,0.38);
    border-radius: 2px;
  }

  /* Accent rule: flush to panel's left inner edge, full text-block height. */
  #rule {
    position: absolute;
    left: 56px;
    top: 50%;
    width: 2px;
    height: 62%;
    background: var(--accent, #C89B5C);
    transform-origin: center center;
    transform: translateY(-50%) scaleY(0);
    box-shadow: 0 0 10px rgba(200,155,92,0.35);
  }

  /* Text block sits inside the panel, right of the rule, with generous right
     padding so the wipe masks below never clip the settled string. */
  #text-block {
    position: absolute;
    left: 84px;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
  }

  #name-mask, #role-mask {
    overflow: hidden;
    clip-path: inset(0 100% 0 0); /* left-to-right wipe, closed at start */
    width: 100%;
  }

  #name {
    margin: 0;
    color: #F3EFE8;
    font-weight: 700;
    letter-spacing: 0.03em;      /* eases to 0.01em on landing */
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1;
    /* Fit-to-string size: 26 chars incl. punctuation/spaces at capAdvance ~0.58
       for Space Grotesk -> lineWidth = fontSize * 26 * 0.58. Solved so the
       settled line lands at ~54px, which spans well under the panel's inner
       width (1250 - 84 - 40 = 1126px) with real margin - the direct fix. */
    font-size: 54px;
  }

  #role {
    margin: 0;
    margin-top: calc(1080px * 0.018); /* height*0.018 gap */
    color: rgba(243, 239, 232, 0.8);
    font-size: 32px;             /* height*0.03 */
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    line-height: 1;
  }
</style>
</head>
<body>
<div id="root" data-composition-id="main" data-start="0"
     data-width="1920" data-height="1080" data-duration="4">
  <!-- Single clip spanning the full duration; entrance/hold/exit all live on the timeline. -->
  <section id="strap-layer" class="clip" data-start="0" data-duration="4" data-track-index="1">
    <div id="strap">
      <div id="panel"></div>
      <div id="rule"></div>
      <div id="text-block">
        <div id="name-mask"><h1 id="name" data-var-text="name">DR. ELEANOR VANCE-WHITTAKER</h1></div>
        <div id="role-mask"><div id="role" data-var-text="role">MARINE BIOLOGIST, WOODS HOLE</div></div>
      </div>
    </div>
  </section>
</div>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });

  // ── Fit-to-content safety check (runs once, deterministic - no randomness) ──
  // Widen the strap if the authored/edited name string would otherwise exceed
  // the panel's inner width at the settled 54px size. Guarantees no clipping
  // even if a user edits the "name" variable to something longer.
  (function fitStrapToName() {
    const nameEl = document.getElementById('name');
    const strapEl = document.getElementById('strap');
    if (!nameEl || !strapEl) return;
    const CAP_ADVANCE = 0.58;   // measured for Space Grotesk uppercase
    const FONT_SIZE = 54;
    const LEFT_PAD = 84, RIGHT_PAD = 40;
    const text = (nameEl.textContent || '').trim();
    const estWidth = text.length * FONT_SIZE * CAP_ADVANCE;
    const neededPanelWidth = Math.ceil(estWidth + LEFT_PAD + RIGHT_PAD + 20); // +20px safety
    const currentWidth = 1250;
    if (neededPanelWidth > currentWidth) {
      strapEl.style.width = neededPanelWidth + 'px';
    }
  })();

  // ── Timing constants (composition seconds) ──────────────────────────────
  const PANEL_IN_START   = 0.00;
  const PANEL_IN_DUR     = 0.60;
  const NAME_WIPE_START  = 0.13;
  const NAME_WIPE_DUR    = 0.47;  // settles at 0.60
  const ROLE_WIPE_START  = 0.23;
  const ROLE_WIPE_DUR    = 0.40;  // settles at 0.63
  const RULE_DRAW_START  = 0.63;
  const RULE_DRAW_DUR    = 0.07;  // completes at 0.70
  const HOLD_START       = 0.70;
  const TEXT_EXIT_START  = 3.15;
  const TEXT_EXIT_DUR    = 0.35;  // completes 3.50
  const ROLE_EXIT_START  = 3.17;  // name leads role by ~2 frames
  const PANEL_EXIT_START = 3.28;
  const PANEL_EXIT_DUR   = 0.57;  // completes 3.85

  // ── Phase 1: panel slides in from off-frame left, power3-out ────────────
  tl.fromTo('#strap',
    { xPercent: -140 },
    { xPercent: 0, duration: PANEL_IN_DUR, ease: 'power3.out' },
    PANEL_IN_START
  );

  // ── Phase 2: name reveals via left-to-right clip-path wipe ──────────────
  tl.fromTo('#name-mask',
    { clipPath: 'inset(0 100% 0 0)' },
    { clipPath: 'inset(0 0% 0 0)', duration: NAME_WIPE_DUR, ease: 'power3.out' },
    NAME_WIPE_START
  );
  // Letter-spacing tightens on landing for a typed-on finish.
  tl.fromTo('#name',
    { letterSpacing: '0.03em' },
    { letterSpacing: '0.01em', duration: NAME_WIPE_DUR, ease: 'power3.out' },
    NAME_WIPE_START
  );

  // ── Phase 3: role reveals 3 frames after name, same wipe treatment ──────
  tl.fromTo('#role-mask',
    { clipPath: 'inset(0 100% 0 0)' },
    { clipPath: 'inset(0 0% 0 0)', duration: ROLE_WIPE_DUR, ease: 'power3.out' },
    ROLE_WIPE_START
  );

  // ── Phase 4: accent rule draws last - the final entrance beat ───────────
  tl.fromTo('#rule',
    { scaleY: 0 },
    { scaleY: 1, duration: RULE_DRAW_DUR, ease: 'power2.out' },
    RULE_DRAW_START
  );

  // ── Hold: subtle ambient breathing, +/-3px vertical, slow easy sine ─────
  // Compressed "6s-equivalent" feel into the hold window with a gentle repeat.
  tl.to('#strap', {
    y: '+=3',
    duration: 1.22,
    ease: 'sine.inOut',
    repeat: 1,
    yoyo: true
  }, HOLD_START);

  // ── Exit: text leads (fade + slide left), rule fades with role ──────────
  tl.to('#name-mask', {
    x: -30, autoAlpha: 0, duration: TEXT_EXIT_DUR, ease: 'power2.in'
  }, TEXT_EXIT_START);
  tl.to('#role-mask', {
    x: -30, autoAlpha: 0, duration: TEXT_EXIT_DUR, ease: 'power2.in'
  }, ROLE_EXIT_START);
  tl.to('#rule', {
    scaleY: 0, autoAlpha: 0, duration: TEXT_EXIT_DUR, ease: 'power2.in'
  }, ROLE_EXIT_START);

  // Panel chases 3 frames later, clearing fully off-frame left before the cut.
  tl.to('#strap', {
    xPercent: -230, duration: PANEL_EXIT_DUR, ease: 'power2.in'
  }, PANEL_EXIT_START);

  window.__timelines['main'] = tl;
</script>
</body>
</html>
