# The same gate a developer runs locally, on every push: npm run build (typecheck + lint +
# vite build) and the full offline e2e suite. The suite pins offline mode itself
# (playwright.config.ts webServer.env), so no secrets are needed here — and none should be
# added: the live/authed flows run under playwright.live.config.ts, maintainer-only.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      # Node 24 (LTS) — the version the project is developed on, so npm validates the
      # lockfile exactly the way the machine that wrote it does.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck + lint + bundle)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E suite
        run: npm run test:e2e

      # The template-factory gates (docs/GRAPHIC_TYPES.md): six promotion gates over every
      # type design, the pack taxonomy (src/templates/packs.ts resolves, 60 formats covered
      # exactly once), and the literal-token-drift grep. Needs the dev server up (the
      # l3-sweep contract) — started only AFTER the suite, so Playwright's own offline-pinned
      # webServer never finds a stale server on the port (the reuseExistingServer gotcha).
      # The port is path-derived; scripts/factory.mjs derives the same number itself.
      - name: Factory gates
        run: |
          npm run dev &
          DEV_PID=$!
          PORT="$(node scripts/dev-port.mjs)"
          for i in $(seq 1 60); do
            curl -sf "http://localhost:${PORT}/app" > /dev/null && break
            sleep 1
          done
          STATUS=0
          node scripts/factory.mjs --json factory-report.json || STATUS=$?
          kill "$DEV_PID" || true
          exit $STATUS

      - name: Upload factory report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: factory-report
          path: factory-report.json
          retention-days: 7
          if-no-files-found: ignore

      # The list reporter prints failures to the log; the per-test error context,
      # screenshots, and DOM snapshots land in test-results/ — keep them for debugging.
      - name: Upload failure evidence
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
